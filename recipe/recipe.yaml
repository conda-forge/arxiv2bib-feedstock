schema_version: 1

context:
  name: arxiv2bib
  version: "1.0.8"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/arxiv2bib-${{ version }}.tar.gz
  sha256: 137608ed8aa4da6594350152964b9b0f46c6efcb07f8a4dfd50309c968b647a8

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - arxiv2bib = arxiv2bib:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - arxiv2bib
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - arxiv2bib --help

about:
  summary: Get arXiv.org metadata in BibTeX format
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: http://nathangrigg.github.io/arxiv2bib

extra:
  recipe-maintainers:
    - jan-janssen
